name: Deploy to Tencent Cloud

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            export PATH=$PATH:/root/.nvm/versions/node/*/bin:$(dirname $(which node 2>/dev/null) 2>/dev/null)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /opt/MBTI-PRO
            git fetch --unshallow origin 2>/dev/null || true
            git fetch origin master
            git reset --hard origin/master
            cd server && npx prisma generate && npx prisma db push
            # 修复6个中文名(数据库层面)
            npx tsx scripts/fix-names.ts
            cd ../client && npm install && npm run build
            npx pm2 delete mbti-pro 2>/dev/null; cd /opt/MBTI-PRO/server && npx pm2 start src/index.ts --name mbti-pro --interpreter tsx -- --port 3001 || (cd /opt/MBTI-PRO/server && npx tsx src/index.ts &)
            echo "✅ Deploy done"
