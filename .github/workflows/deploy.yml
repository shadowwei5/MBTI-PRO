name: Deploy to Tencent Cloud

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            export PATH=$PATH:/root/.nvm/versions/node/*/bin:$(dirname $(which node 2>/dev/null) 2>/dev/null)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /opt/MBTI-PRO
            export DEBIAN_FRONTEND=noninteractive
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update || true
              apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libxkbcommon0 libxss1 libgtk-3-0 || true
              apt-get install -y libasound2 || apt-get install -y libasound2t64 || true
            elif command -v yum >/dev/null 2>&1; then
              yum install -y mesa-libgbm nss atk at-spi2-atk libxkbcommon libXScrnSaver gtk3 alsa-lib || true
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y mesa-libgbm nss atk at-spi2-atk libxkbcommon libXScrnSaver gtk3 alsa-lib || true
            fi
            git fetch --unshallow origin 2>/dev/null || true
            git fetch origin master
            git reset --hard origin/master
            # 注入 XorPay 支付 + SMTP 邮件环境变量
            sed -i '/^XORPAY_/d' server/.env
            sed -i '/^SMTP_/d' server/.env
            cat >> server/.env << 'ENVEOF'
            XORPAY_AID=${{ secrets.XORPAY_AID }}
            XORPAY_SECRET=${{ secrets.XORPAY_SECRET }}
            XORPAY_NOTIFY_URL=${{ secrets.XORPAY_NOTIFY_URL }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ENVEOF
            cd server
            npm install --include=dev
            npx prisma generate
            npx prisma db push
            npx playwright install --with-deps chromium || npx playwright install chromium || true
            # 修复6个中文名(数据库层面)
            npx tsx scripts/fix-names.ts
            cd ../client && npm install && npm run build
            cd /opt/MBTI-PRO && fuser -k 3001/tcp 2>/dev/null || true && sleep 1 && npx pm2 kill 2>/dev/null || true && cd server && setsid nohup npx tsx src/index.ts > /tmp/mbti-pro.log 2>&1 < /dev/null &
            echo "✅ Deploy done"
