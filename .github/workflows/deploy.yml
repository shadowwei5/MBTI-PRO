name: Deploy to Tencent Cloud

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            export PATH=$PATH:/root/.nvm/versions/node/*/bin:$(dirname $(which node 2>/dev/null) 2>/dev/null)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd /opt/MBTI-PRO
            git fetch --unshallow origin 2>/dev/null || true
            git fetch origin master
            git reset --hard origin/master
            # 注入 XorPay 支付环境变量（不覆盖已有配置）
            grep -q "^XORPAY_AID=" server/.env 2>/dev/null || echo "XORPAY_AID=${{ secrets.XORPAY_AID }}" >> server/.env
            grep -q "^XORPAY_SECRET=" server/.env 2>/dev/null || echo "XORPAY_SECRET=${{ secrets.XORPAY_SECRET }}" >> server/.env
            grep -q "^XORPAY_NOTIFY_URL=" server/.env 2>/dev/null || echo "XORPAY_NOTIFY_URL=${{ secrets.XORPAY_NOTIFY_URL }}" >> server/.env
            cd server && npx prisma generate && npx prisma db push
            # 修复6个中文名(数据库层面)
            npx tsx scripts/fix-names.ts
            cd ../client && npm install && npm run build
            cd /opt/MBTI-PRO && fuser -k 3001/tcp 2>/dev/null || true && sleep 1 && npx pm2 kill 2>/dev/null || true && cd server && nohup npx tsx src/index.ts > /tmp/mbti-pro.log 2>&1 &
            echo "✅ Deploy done"
