# MBTI-PRO Nginx 配置（HTTPS + IPv4/IPv6 双栈）
# 安装: curl -fsSL https://raw.githubusercontent.com/shadowwei5/MBTI-PRO/master/scripts/nginx-ssl.conf -o /etc/nginx/conf.d/mbti-pro.conf

# HTTP 自动跳转 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mbti-pro.duckdns.org 43.128.24.59;
    return 301 https://$host$request_uri;
}

# HTTPS 主站
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mbti-pro.duckdns.org 43.128.24.59;

    ssl_certificate /etc/letsencrypt/live/mbti-pro.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mbti-pro.duckdns.org/privkey.pem;

    root /opt/MBTI-PRO/client/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json image/webp;
    gzip_min_length 256;
    gzip_comp_level 5;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
